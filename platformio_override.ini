; platformio_override.ini
; Custom PlatformIO build environments for
; Waveshare ESP32-S3-ETH-8DI-8RO / ESP32-S3-POE-ETH-8DI-8RO
;
; Board: ESP32-S3-WROOM-1U-N16R8 (16 MB Flash, 8 MB OPI PSRAM)
;
; Usage (local):
;   platformio run -e tasmota32s3-waveshare

[platformio]
default_envs =
  tasmota32s3-waveshare

; ---- Standard build (QSPI flash mode, WiFi+ETH) ---------------------
[env:tasmota32s3-waveshare]
extends         = env:tasmota32s3
build_flags     = ${env:tasmota32s3.build_flags}
                  -DCODE_IMAGE_STR='"waveshare-8di8ro"'
